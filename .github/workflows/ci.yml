name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          find . \( -name '*.sh' -o -name 'bootstrap.sh' -o -name 'smoke-test' \) \
            -not -path './.git/*' \
            | xargs shellcheck --severity=warning

  manifest:
    name: catalog valid JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest/catalog.json
        run: |
          if ! jq empty manifest/catalog.json; then
            echo "manifest/catalog.json is not valid JSON"
            exit 1
          fi
          count="$(jq 'length' manifest/catalog.json)"
          echo "manifest/catalog.json valid — $count entries"
